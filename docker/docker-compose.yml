version: "3.8"

services:
  forge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ahinsaai/forge:latest
    container_name: forge
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - FORGE_ENV=production
      - FORGE_LOG_LEVEL=info
      - FORGE_MEMORY_BACKEND=redis
      - FORGE_REDIS_URL=redis://redis:6379/0
      - FORGE_GOVERNANCE_ENABLED=true
      - FORGE_TRIDENT_ENABLED=true
      - FORGE_MAX_CONCURRENT_AGENTS=20
      - FORGE_HUMAN_CHECKPOINT_THRESHOLD=0.7
    volumes:
      - ./specs:/app/specs
      - ./constitutions:/app/constitutions
      - ./agents.yaml:/app/agents.yaml
      - forge-graph:/app/.forge/graph
      - forge-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - forge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - forge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: forge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - forge-network
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: forge-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - forge-network
    profiles:
      - monitoring

volumes:
  forge-graph:
  forge-logs:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  forge-network:
    driver: bridge
