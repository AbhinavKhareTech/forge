version: "3.8"

services:
  # ── Forge API ───────────────────────────────────────────────
  forge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    image: ahinsaai/forge:latest
    container_name: forge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      FORGE_ENVIRONMENT: production
      FORGE_DEBUG: "false"
      FORGE_API_HOST: 0.0.0.0
      FORGE_API_PORT: 8000
      FORGE_DATABASE_BACKEND: postgresql
      FORGE_DATABASE_URL: postgresql+asyncpg://forge:${FORGE_DB_PASSWORD}@postgres:5432/forge
      FORGE_REDIS_URL: redis://redis:6379/0
      FORGE_TRIDENT_MODE: fallback_rules
      FORGE_TRIDENT_URL: http://trident:8080
      FORGE_OTEL_EXPORTER_ENDPOINT: http://jaeger:4317
      FORGE_SENTRY_DSN: ${FORGE_SENTRY_DSN}
      FORGE_SENTRY_ENVIRONMENT: production
      FORGE_PROMETHEUS_PORT: 9090
      FORGE_LOG_LEVEL: INFO
      FORGE_LOG_FORMAT: json
      FORGE_RATE_LIMIT_REQUESTS: 1000
      FORGE_RATE_LIMIT_WINDOW: 60
      FORGE_GOVERNANCE_AUDIT_LOG_PATH: /var/log/forge/audit.log
      FORGE_ORCHESTRATOR_MAX_CONCURRENT_SPECS: 50
      FORGE_JWT_SECRET: ${FORGE_JWT_SECRET}
      FORGE_API_KEY: ${FORGE_API_KEY}
      FORGE_ENCRYPTION_KEY: ${FORGE_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - forge-logs:/var/log/forge
    networks:
      - forge-network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${FORGE_DB_PASSWORD}
      POSTGRES_DB: forge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - forge-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - forge-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: forge-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - forge-network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: forge-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      - forge-network
    depends_on:
      - prometheus

  # ── Jaeger (Tracing) ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: forge-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - forge-network

  # ── Nginx (Reverse Proxy) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: forge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - forge-network
    depends_on:
      - forge

volumes:
  forge-logs:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  forge-network:
    driver: bridge
