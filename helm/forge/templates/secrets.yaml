apiVersion: v1
kind: Secret
metadata:
  name: {{ include "forge.fullname" . }}-secrets
  labels:
    {{- include "forge.labels" . | nindent 4 }}
type: Opaque
stringData:
  FORGE_JWT_SECRET: {{ required "JWT secret is required" .Values.secrets.jwtSecret | quote }}
  FORGE_API_KEY: {{ required "API key is required" .Values.secrets.apiKey | quote }}
  FORGE_ENCRYPTION_KEY: {{ required "Encryption key is required" .Values.secrets.encryptionKey | quote }}
  FORGE_DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  FORGE_REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  FORGE_SENTRY_DSN: {{ .Values.secrets.sentryDsn | quote }}
  {{- if .Values.secrets.mcpGithubToken }}
  FORGE_MCP_GITHUB_TOKEN: {{ .Values.secrets.mcpGithubToken | quote }}
  {{- end }}
  {{- if .Values.secrets.mcpJiraToken }}
  FORGE_MCP_JIRA_TOKEN: {{ .Values.secrets.mcpJiraToken | quote }}
  FORGE_MCP_JIRA_EMAIL: {{ .Values.secrets.mcpJiraEmail | quote }}
  {{- end }}
