apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forge.fullname" . }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "forge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "forge.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "forge.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: FORGE_ENV
              value: {{ .Values.forge.env | quote }}
            - name: FORGE_LOG_LEVEL
              value: {{ .Values.forge.logLevel | quote }}
            - name: FORGE_GOVERNANCE_ENABLED
              value: {{ .Values.forge.governanceEnabled | quote }}
            - name: FORGE_TRIDENT_ENABLED
              value: {{ .Values.forge.tridentEnabled | quote }}
            - name: FORGE_MAX_CONCURRENT_AGENTS
              value: {{ .Values.forge.maxConcurrentAgents | quote }}
            - name: FORGE_HUMAN_CHECKPOINT_THRESHOLD
              value: {{ .Values.forge.humanCheckpointThreshold | quote }}
            - name: FORGE_MEMORY_BACKEND
              value: {{ .Values.forge.memory.backend | quote }}
            - name: FORGE_REDIS_URL
              value: {{ .Values.forge.memory.redisUrl | quote }}
            - name: FORGE_TRIDENT_GRAPH_DIR
              value: {{ .Values.forge.trident.graphDir | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: forge-graph
              mountPath: /app/.forge/graph
            - name: forge-logs
              mountPath: /app/logs
      volumes:
        - name: forge-graph
          emptyDir: {}
        - name: forge-logs
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
