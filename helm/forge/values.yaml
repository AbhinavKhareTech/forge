# Default values for Forge.
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: ghcr.io/ahinsaai/forge
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  fsGroup: 999

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 8000
  metricsPort: 9090

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: forge.ahinsa.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: forge-tls
      hosts:
        - forge.ahinsa.ai

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - forge
          topologyKey: kubernetes.io/hostname

# ── Secrets (MUST be overridden) ──────────────────────────────
secrets:
  jwtSecret: ""
  apiKey: ""
  encryptionKey: ""
  databaseUrl: ""
  redisUrl: ""
  sentryDsn: ""
  mcpGithubToken: ""
  mcpJiraToken: ""
  mcpJiraEmail: ""

# ── Network Policy ──────────────────────────────────────────────
networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
  monitoringNamespace: monitoring
  observabilityNamespace: observability

# ── Service Monitor ───────────────────────────────────────────
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels: {}

# ── Pod Disruption Budget ─────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ── Environment-specific config ───────────────────────────────
config:
  environment: production
  debug: false
  logLevel: INFO
  logFormat: json
  tridentMode: fallback_rules
  rateLimitRequests: 1000
  rateLimitWindow: 60
  governanceAuditLogPath: /var/log/forge/audit.log
  orchestratorMaxConcurrentSpecs: 50

# ── Volumes ───────────────────────────────────────────────────
volumes:
  - name: tmp
    emptyDir: {}
  - name: logs
    emptyDir:
      sizeLimit: 1Gi

volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: logs
    mountPath: /var/log/forge
